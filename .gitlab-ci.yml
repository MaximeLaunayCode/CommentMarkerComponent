include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/marker-comment@$CI_COMMIT_SHA
    inputs:
      job-name: sample-consumer-pipeline
      stage: integration
      marker-text: "Managed by the marker-comment component release gate"
      file-globs:
        - tests/fixtures/release-consumer/src/**
      fail-when-patch-needed: false

workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - test
  - build
  - integration
  - release

unit-tests:
  stage: test
  image: python:3.13-alpine3.22
  before_script:
    - pip install --no-cache-dir -r requirements-dev.txt
  script:
    - python -m unittest tests.test_processor

component-lint:
  stage: test
  image: python:3.13-alpine3.22
  before_script:
    - pip install --no-cache-dir -r requirements-dev.txt
  script:
    # GitLab compiles the component include above before starting this job.
    - python -m unittest tests.test_component tests.test_release.ReleaseContractTests

build-processor-image:
  stage: build
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
    - docker build --pull --tag "$CI_REGISTRY_IMAGE/marker-comment:$CI_COMMIT_SHA" --file templates/marker-comment/Dockerfile .
    - docker push "$CI_REGISTRY_IMAGE/marker-comment:$CI_COMMIT_SHA"
    - if [ -n "$CI_COMMIT_TAG" ]; then docker tag "$CI_REGISTRY_IMAGE/marker-comment:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE/marker-comment:$CI_COMMIT_TAG"; docker push "$CI_REGISTRY_IMAGE/marker-comment:$CI_COMMIT_TAG"; fi

release-e2e:
  stage: integration
  image: $CI_REGISTRY_IMAGE/marker-comment:$CI_COMMIT_SHA
  before_script:
    - pip install --no-cache-dir -r requirements-dev.txt
  script:
    - python -m unittest tests.test_release.TaggedConsumerEndToEndTests

publish-component-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:v1.69.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$/'
  needs:
    - unit-tests
    - component-lint
    - build-processor-image
    - release-e2e
  script:
    - echo "Publishing marker-comment $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Marker Comment $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG of marker-comment from $CI_PROJECT_PATH"
