tagged-component-e2e:
  rules:
    - if: '$CI_COMMIT_TAG'
  variables:
    RELEASE_FIXTURE_DIR: "$CI_PROJECT_DIR/.release-fixture"
  before_script:
    - . tests/fixtures/setup-release-fixture.sh "$RELEASE_FIXTURE_DIR"
  after_script:
    - cp "$RELEASE_FIXTURE_DIR/marker-comment.patch" "$CI_PROJECT_DIR/marker-comment.patch"
